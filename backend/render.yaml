services:
  - type: web
    name: lotes-web-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: UPLOAD_DIR
        value: uploads
      - key: WEB_API_BASE_URL
        value: https://inmopro.laravel.cloud
      - key: WEB_API_TIPO_WEB
        value: lotesenremate.pe
